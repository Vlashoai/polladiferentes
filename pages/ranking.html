<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking – Polla del Mundial 2026</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<main class="page-content">
  <div class="page-header">
    <h2 class="page-title">🏆 Ranking en Vivo</h2>
    <p class="page-sub">Actualización automática · Puntos calculados en tiempo real</p>
  </div>

  <div class="points-legend">
    <div class="legend-item"><span class="pts-badge">2 pts</span> Fase de Grupos</div>
    <div class="legend-item"><span class="pts-badge">3 pts</span> Ronda de 32</div>
    <div class="legend-item"><span class="pts-badge">4 pts</span> Ronda de 16</div>
    <div class="legend-item"><span class="pts-badge">5 pts</span> Cuartos</div>
    <div class="legend-item"><span class="pts-badge">7 pts</span> Semifinal</div>
    <div class="legend-item"><span class="pts-badge">10 pts</span> Campeón</div>
  </div>

  <div id="rankingContainer" class="ranking-container">
    <div class="loading-state">Calculando ranking...</div>
  </div>
</main>

<script src="../app.js"></script>
<script>
  const user = buildNav('ranking');
  if (!user) throw new Error('no user');

  const MEDALS = ['🥇', '🥈', '🥉'];

  async function loadAndRender() {
    const [picks, results, picksElim, resultsElim] = await Promise.all([
      getAllPicks(), getAllResults(), getAllPicksElim(), getAllResultsElim()
    ]);

    const scores = PARTICIPANTS.map(p => {
      const ptsG = calcPuntosGrupos(picks[p], results);
      const ptsE = calcPuntosElim(picksElim[p], resultsElim);
      return { name: p, ptsG, ptsE, total: ptsG + ptsE };
    });

    scores.sort((a, b) => b.total - a.total || b.ptsG - a.ptsG || a.name.localeCompare(b.name));

    let pos = 1;
    scores.forEach((s, i) => { if (i > 0 && scores[i-1].total !== s.total) pos = i + 1; s.pos = pos; });

    document.getElementById('rankingContainer').innerHTML = `
      <table class="ranking-table">
        <thead><tr><th>Pos.</th><th>Participante</th><th>Pts Grupos</th><th>Pts Elim.</th><th>TOTAL</th><th></th></tr></thead>
        <tbody>
          ${scores.map((s, i) => `
            <tr class="rank-row ${s.name === user ? 'rank-you' : ''} ${i === 0 ? 'rank-first' : ''}">
              <td class="rank-pos">${s.pos}</td>
              <td class="rank-name">${s.name === user ? '<strong>' + s.name + '</strong>' : s.name}</td>
              <td class="rank-pts">${s.ptsG}</td>
              <td class="rank-pts">${s.ptsE}</td>
              <td class="rank-total">${s.total}</td>
              <td class="rank-medal">${MEDALS[s.pos - 1] || ''}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div class="ranking-footer">
        Partidos jugados: <strong>${Object.keys(results).length}</strong> de ${GROUP_MATCHES.length + KNOCKOUT_MATCHES.length}
        &nbsp;·&nbsp; Última actualización: ${new Date().toLocaleTimeString('es-MX')}
      </div>
    `;
  }

  loadAndRender();
  setInterval(loadAndRender, 15000);
</script>
</body>
</html>
