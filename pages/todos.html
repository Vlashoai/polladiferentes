<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ver Todos – Polla del Mundial 2026</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .match-row-clickable { cursor: pointer; }
    .match-row-clickable:hover td { background: rgba(255,255,255,0.06); }
    .match-detail-btn {
      margin-left: 8px;
      border: none;
      background: rgba(255,255,255,0.12);
      color: inherit;
      border-radius: 6px;
      width: 22px;
      height: 22px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
    }
    .match-detail-btn:hover { background: rgba(255,255,255,0.22); }

    .vote-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .vote-modal {
      background: #16132a;
      color: #f0eeff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      max-width: 480px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .vote-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 4px;
    }
    .vote-modal-title { font-size: 18px; font-weight: 700; }
    .vote-modal-sub { font-size: 13px; opacity: 0.65; margin-bottom: 16px; }
    .vote-modal-close {
      border: none;
      background: rgba(255,255,255,0.1);
      color: inherit;
      border-radius: 8px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 15px;
      flex-shrink: 0;
    }
    .vote-modal-close:hover { background: rgba(255,255,255,0.2); }
    .vote-group { margin-bottom: 16px; }
    .vote-group:last-child { margin-bottom: 0; }
    .vote-group-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.8;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .vote-group-title.win1 { color: #6cf7a7; }
    .vote-group-title.win2 { color: #f7a76c; }
    .vote-group-title.draw { color: #c76cf7; }
    .vote-names { display: flex; flex-wrap: wrap; gap: 6px; }
    .vote-name-chip {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 13px;
    }
    .vote-empty { font-size: 13px; opacity: 0.5; }
  </style>
</head>
<body>

<main class="page-content">
  <div class="page-header">
    <h2 class="page-title">👁 Pronósticos de Todos</h2>
    <p class="page-sub">Vista comparativa en tiempo real. <span class="legend-correct">Verde</span> = correcto · <span class="legend-wrong">Rojo</span> = incorrecto.</p>
  </div>

  <div class="filter-bar">
    <label class="field-label">Filtrar por grupo:</label>
    <select id="grupoFilter" class="filter-select">
      <option value="">Todos los grupos</option>
      <option>Grupo A</option><option>Grupo B</option><option>Grupo C</option>
      <option>Grupo D</option><option>Grupo E</option><option>Grupo F</option>
      <option>Grupo G</option><option>Grupo H</option><option>Grupo I</option>
      <option>Grupo J</option><option>Grupo K</option><option>Grupo L</option>
    </select>
  </div>

  <div class="table-wrapper" id="tableWrapper">
    <div class="loading-state">Cargando...</div>
  </div>
</main>

<script src="../app.js"></script>
<script>
  const user = buildNav('todos');
  if (!user) throw new Error('no user');

  let allPicks = {}, allResults = {}, grupoFilter = '';

  async function loadData() {
    allPicks = await getAllPicks();
    allResults = await getAllResults();
    render();
  }
  loadData();

  document.getElementById('grupoFilter').addEventListener('change', e => {
    grupoFilter = e.target.value;
    render();
  });

  function activeParticipants() {
    return PARTICIPANTS.filter(p => allPicks[p] && Object.keys(allPicks[p]).length > 0);
  }

  function render() {
    const wrapper = document.getElementById('tableWrapper');
    const filtered = grupoFilter ? GROUP_MATCHES.filter(m => m.grupo === grupoFilter) : GROUP_MATCHES;
    const active = activeParticipants();

    if (!active.length) {
      wrapper.innerHTML = '<div class="loading-state">Aún no hay pronósticos registrados.</div>';
      return;
    }

    let html = `<table class="picks-table"><thead><tr>
        <th class="col-match">Partido</th><th class="col-result">Resultado</th>
        ${active.map(p => `<th class="col-p ${p===user?'col-you':''}">${p}</th>`).join('')}
      </tr></thead><tbody>`;

    let lastGroup = '';
    filtered.forEach(m => {
      if (m.grupo !== lastGroup) {
        lastGroup = m.grupo;
        html += `<tr class="group-divider"><td colspan="${2+active.length}">${m.grupo}</td></tr>`;
      }
      const key = 'p' + m.id;
      const result = allResults[key];
      const realResult = result ? resultFromGoals(result.g1, result.g2) : null;
      const scoreStr = (result && result.g1 !== undefined && result.g2 !== undefined) ? `${result.g1}–${result.g2}` : '—';

      html += `<tr>
        <td class="col-match">
          <span class="match-short">${m.eq1} vs ${m.eq2}</span>
          <button class="match-detail-btn" type="button" data-match-id="${m.id}" title="Ver quién votó qué">👁</button>
        </td>
        <td class="col-result ${realResult?'has-result':''}">${realResult ? `${realResult} (${scoreStr})` : scoreStr}</td>
        ${active.map(p => {
          const pick = (allPicks[p] && allPicks[p][key]) || '';
          const cls = pickClass(pick, realResult);
          return `<td class="pick-cell ${cls} ${p===user?'col-you':''}">${pick || '–'}</td>`;
        }).join('')}
      </tr>`;
    });

    html += '</tbody></table>';
    wrapper.innerHTML = html;

    wrapper.querySelectorAll('.match-detail-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const matchId = Number(btn.dataset.matchId);
        openVoteModal(matchId);
      });
    });
  }

  function openVoteModal(matchId) {
    const m = GROUP_MATCHES.find(mm => mm.id === matchId);
    if (!m) return;
    const key = 'p' + matchId;
    const active = activeParticipants();

    const groups = { G1: [], G2: [], E: [] };
    active.forEach(p => {
      const pick = allPicks[p] && allPicks[p][key];
      if (pick === 'G1' || pick === 'G2' || pick === 'E') groups[pick].push(p);
    });

    const sectionHtml = (title, cls, names) => `
      <div class="vote-group">
        <div class="vote-group-title ${cls}">${title} (${names.length})</div>
        ${names.length
          ? `<div class="vote-names">${names.map(n => `<span class="vote-name-chip">${n}</span>`).join('')}</div>`
          : `<div class="vote-empty">Nadie votó por esta opción todavía.</div>`}
      </div>`;

    const overlay = document.createElement('div');
    overlay.className = 'vote-modal-overlay';
    overlay.innerHTML = `
      <div class="vote-modal" role="dialog" aria-modal="true">
        <div class="vote-modal-header">
          <div>
            <div class="vote-modal-title">${m.eq1} vs ${m.eq2}</div>
            <div class="vote-modal-sub">${m.grupo} · ${formatDate(m.fecha)}</div>
          </div>
          <button class="vote-modal-close" type="button" aria-label="Cerrar">✕</button>
        </div>
        ${sectionHtml(`Ganador ${m.eq1}`, 'win1', groups.G1)}
        ${sectionHtml(`Ganador ${m.eq2}`, 'win2', groups.G2)}
        ${sectionHtml('Empate', 'draw', groups.E)}
      </div>`;

    document.body.appendChild(overlay);

    const close = () => overlay.remove();
    overlay.querySelector('.vote-modal-close').addEventListener('click', close);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) close();
    });
    document.addEventListener('keydown', function onEsc(e) {
      if (e.key === 'Escape') { close(); document.removeEventListener('keydown', onEsc); }
    });
  }
</script>
</body>
</html>
